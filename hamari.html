<body class="juggle-simple-page">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html"><span class="brand-name">ICHIGEKI</span><span class="brand-sub">ハマりランキング</span></a>
      <nav class="nav"><a href="index.html">トップ</a><a href="ranking.html#hamari-ranking">ランキング</a></nav>
    </div>
  </header>
  <main class="simple-page">
    <section class="juggle-simple-stage">
      <div class="simple-title-line"><span></span><h1>ハマり確率</h1><span></span></div>
      <div class="simple-status-card"><strong><span class="status-dot"></span><span>固定条件</span></strong><p>1/319で1000回転</p></div>
      <div class="simple-rule-row" aria-label="チャレンジ条件">
        <span><b>確率</b><strong>1/319</strong></span>
        <span><b>回転数</b><strong>1000回転</strong></span>
        <span><b>記録</b><strong>ハマり率</strong></span>
      </div>
      <div class="simple-result-card">
        <strong id="resultHamari">--</strong>
        <b id="resultSpins">--</b>
        <small>ハマる確率</small>
        <em><span id="resultRate">--</span> / 当たる確率 <span id="resultHit">--</span></em>
      </div>
      <a class="simple-rank-link" href="ranking.html#hamari-ranking">ランキングを見る</a>
      <div class="simple-start-area">
        <button class="simple-start-button" data-action="hamari"><span>START</span><small>計算開始</small></button>
      </div>
      <div class="simple-sub-actions">
        <button class="button" data-action="saveHamari">ランキングに保存</button>
        <button class="button" data-action="share">結果をコピー</button>
        <a class="button" href="index.html">トップへ戻る</a>
      </div>
      <div class="simple-next-row" aria-label="次に遊ぶ">
        <a href="pachinko-319.html">一撃319へ</a>
        <a href="rare-8192.html">8192へ</a>
        <a href="ranking.html#hamari-ranking">記録へ</a>
      </div>
      <div class="field record-name-field"><label for="recordName">保存名</label><input id="recordName" type="text" maxlength="12" value="あなた"></div>
      <div class="log-box simple-log" id="log">STARTを押すとハマり確率を表示します。</div>
      <div class="ad-box simple-ad" data-ad-slot="hamari-simple-footer"><span class="ad-label">PR</span><span class="ad-title">広告枠</span></div>
      <p class="note">毎回同じ確率で独立抽選される前提の娯楽用計算です。</p>
    </section>
  </main>
  <script src="main.js"></script>
