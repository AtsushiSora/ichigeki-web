<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050705">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="description" content="STARTを押すだけでCZ突破、ATセット数、獲得枚数、差枚を試せるランキングチャレンジです。">
  <title>CZ突破チャレンジ | ICHIGEKI</title>
  <link rel="canonical" href="https://atsushisora.github.io/ichigeki-web/cz-challenge.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ICHIGEKI">
  <meta property="og:title" content="CZ突破チャレンジ | ICHIGEKI">
  <meta property="og:description" content="STARTを押すだけでCZ突破、ATセット数、獲得枚数、差枚を試せるランキングチャレンジです。">
  <meta property="og:url" content="https://atsushisora.github.io/ichigeki-web/cz-challenge.html">
  <meta property="og:image" content="https://atsushisora.github.io/ichigeki-web/icon.svg">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="CZ突破チャレンジ | ICHIGEKI">
  <meta name="twitter:description" content="STARTを押すだけでCZ突破、ATセット数、獲得枚数、差枚を試せるランキングチャレンジです。">
  <link rel="stylesheet" href="style.css">
</head>
<body class="juggle-simple-page">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html"><span class="brand-name">ICHIGEKI</span><span class="brand-sub">CZランキング</span></a>
      <nav class="nav"><a href="index.html">トップ</a><a href="ranking.html#cz-ranking">ランキング</a></nav>
    </div>
  </header>
  <main class="simple-page">
    <section class="juggle-simple-stage">
      <div class="simple-title-line"><span></span><h1>CZ突破</h1><span></span></div>
      <div class="simple-status-card"><strong><span class="status-dot"></span><span>固定スペック</span></strong><p>CZ 1/180・成功40%・AT継続70%</p></div>
      <div class="simple-result-card">
        <strong id="resultMedals">0枚</strong>
        <b id="resultCz">--</b>
        <small id="resultChain">0セット</small>
        <em><span id="resultGames">0G</span> / <span id="resultInvestment">0円</span> / <span id="resultDiff">0枚</span></em>
      </div>
      <a class="simple-rank-link" href="ranking.html#cz-ranking">ランキングを見る</a>
      <div class="simple-start-area">
        <button class="simple-start-button" data-action="czChallenge"><span>START</span><small>変動開始</small></button>
      </div>
      <div class="simple-sub-actions">
        <button class="button" data-action="saveCzChallenge">ランキングに保存</button>
        <button class="button" data-action="share">結果をコピー</button>
        <a class="button" href="index.html">トップへ戻る</a>
      </div>
      <div class="field record-name-field"><label for="recordName">保存名</label><input id="recordName" type="text" maxlength="12" value="あなた"></div>
      <div class="log-box simple-log" id="log">STARTを押すとCZ突破の結果を表示します。</div>
      <div class="ad-box simple-ad" data-ad-slot="cz-simple-footer"><span class="ad-label">PR</span><span class="ad-title">広告枠</span></div>
      <p class="note">娯楽用のシミュレーターです。実際の遊技結果や収支を保証するものではありません。</p>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
